<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemmi Dog Hotel</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;padding:16px;max-width:900px;margin:0 auto}
  h1{font-size:22px;font-weight:600;margin-bottom:4px}
  .subtitle{font-size:13px;color:#666;margin-bottom:20px}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
  .stat{background:#fff;border-radius:10px;padding:12px;text-align:center;border:1px solid #e8e8e4}
  .stat-n{font-size:28px;font-weight:600;line-height:1}
  .stat-l{font-size:12px;color:#888;margin-top:4px}

  .month-nav{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .btn-m{background:#fff;border:1px solid #e0e0d8;border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:18px;color:#555;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .btn-m:hover{background:#f0f0ea}
  .month-title{font-size:17px;font-weight:600;min-width:150px}

  .legend{display:flex;gap:16px;margin-bottom:10px;flex-wrap:wrap}
  .leg{display:flex;align-items:center;gap:6px;font-size:12px;color:#666}
  .leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px}
  .cal-hdr{text-align:center;font-size:11px;color:#999;padding:4px 0;font-weight:600}
  .day{background:#fff;border:1px solid #e8e8e4;border-radius:8px;padding:6px;min-height:70px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
  .day:hover{border-color:#aaa;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .day.empty{background:transparent;border-color:transparent;min-height:0;cursor:default}
  .day.today{border-color:#1D9E75;border-width:2px}
  .day.selected{background:#f0faf5;border-color:#1D9E75;border-width:2px}
  .day-num{font-size:11px;color:#999;margin-bottom:3px}
  .day.today .day-num{color:#0F6E56;font-weight:700}
  .day-total{font-size:20px;font-weight:600;color:#1a1a1a;line-height:1}
  .day.zero .day-total{color:#ccc}
  .day-bars{display:flex;gap:2px;margin-top:4px;height:5px}
  .bar-big{background:#1D9E75;border-radius:2px;height:5px}
  .bar-small{background:#7F77DD;border-radius:2px;height:5px}

  .detail{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:16px;margin-bottom:20px}
  .detail-title{font-size:15px;font-weight:600;margin-bottom:3px}
  .detail-sub{font-size:13px;color:#888;margin-bottom:12px}
  .group-label{font-size:12px;font-weight:600;margin-bottom:6px;margin-top:10px}
  .group-label:first-child{margin-top:0}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:13px}
  .chip-big{background:#E1F5EE;color:#085041}
  .chip-small{background:#EEEDFE;color:#3C3489}

  .add-section{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:16px;margin-bottom:20px}
  .add-title{font-size:15px;font-weight:600;margin-bottom:14px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:12px;color:#666;font-weight:500}
  .field input,.field select{font-size:14px;padding:9px 11px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;width:100%;outline:none}
  .field input:focus,.field select:focus{border-color:#1D9E75}
  .btn-save{background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:14px;cursor:pointer;font-weight:600;margin-top:4px}
  .btn-save:hover{background:#0F6E56}
  .btn-del{background:none;border:none;cursor:pointer;color:#bbb;font-size:14px;padding:2px 5px;border-radius:4px;margin-left:4px;vertical-align:middle}
  .btn-del:hover{color:#e05050}

  .toggle-add{background:#fff;border:1px solid #ddd;border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer;color:#555;font-weight:500;margin-bottom:16px}
  .toggle-add:hover{background:#f5f5f0}

  @media(max-width:500px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .form-row,.form-row-3{grid-template-columns:1fr}
    .day{min-height:54px;padding:4px}
    .day-total{font-size:16px}
  }
</style>
</head>
<body>

<h1>🐾 Gemmi Dog Hotel</h1>
<div class="subtitle" id="hdate"></div>

<div class="stats" id="stats-row"></div>

<button class="toggle-add" onclick="toggleAdd()">➕ Add a new dog</button>

<div class="add-section" id="add-section" style="display:none">
  <div class="add-title">Add a new dog</div>
  <div class="form-row">
    <div class="field"><label>Dog's name</label><input id="an" type="text" placeholder="e.g. Buddy"/></div>
    <div class="field"><label>Size</label>
      <select id="as"><option value="small">Small 🐩</option><option value="big">Big 🐕</option></select>
    </div>
  </div>
  <div class="form-row">
    <div class="field"><label>Check-in date</label><input id="ai" type="date"/></div>
    <div class="field"><label>Check-out date</label><input id="ao" type="date"/></div>
  </div>
  <div class="field" style="margin-bottom:12px"><label>Notes (optional)</label><input id="an2" type="text" placeholder="e.g. needs medication, + cat"/></div>
  <button class="btn-save" onclick="addDog()">Save dog</button>
</div>

<div class="month-nav">
  <button class="btn-m" onclick="changeMonth(-1)">&#8249;</button>
  <div class="month-title" id="mtitle"></div>
  <button class="btn-m" onclick="changeMonth(1)">&#8250;</button>
</div>
<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#1D9E75"></div>Big dogs</div>
  <div class="leg"><div class="leg-dot" style="background:#7F77DD"></div>Small dogs</div>
  <div class="leg"><div class="leg-dot" style="background:#fff;border:2px solid #1D9E75"></div>Today / selected</div>
</div>
<div class="cal" id="cal"></div>

<div class="detail" id="detail" style="display:none"></div>

<script>
const MS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const WD=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
let vM=new Date().getMonth(), vY=new Date().getFullYear(), selDate=null, uid=200, showAdd=false;

function iso(d){return d.toISOString().split('T')[0]}
function tod(){return iso(new Date())}
function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function dim(y,m){return new Date(y,m+1,0).getDate()}

let dogs=[
  {id:1,name:'Rex / Cosmo',size:'big',i:'2026-07-26',o:'2026-08-30',note:''},
  {id:2,name:'Bruno',size:'big',i:'2026-07-21',o:'2026-08-17',note:''},
  {id:3,name:'Nancy',size:'big',i:'2026-08-25',o:'2026-09-15',note:''},
  {id:4,name:'Leo',size:'big',i:'2026-08-05',o:'2026-09-08',note:''},
  {id:5,name:'Bruno 2',size:'big',i:'2026-07-26',o:'2026-08-17',note:''},
  {id:6,name:'Luka',size:'big',i:'2026-06-27',o:'2026-08-05',note:''},
  {id:7,name:'Baily',size:'big',i:'2026-09-06',o:'2026-09-30',note:''},
  {id:8,name:'Dirtee',size:'big',i:'2026-06-20',o:'2026-07-20',note:''},
  {id:9,name:'Maya',size:'big',i:'2026-06-01',o:'2026-08-31',note:''},
  {id:10,name:'Cristal',size:'big',i:'2026-06-01',o:'2026-08-31',note:''},
  {id:11,name:'Amareto',size:'small',i:'2026-06-07',o:'2026-07-01',note:''},
  {id:12,name:'Mecko',size:'small',i:'2026-06-28',o:'2026-07-23',note:''},
  {id:13,name:'Lightning',size:'small',i:'2026-06-18',o:'2026-07-02',note:''},
  {id:14,name:'Snow',size:'small',i:'2026-05-23',o:'2026-06-30',note:''},
  {id:15,name:'Cooper',size:'small',i:'2026-05-25',o:'2026-07-21',note:''},
  {id:16,name:'Barney',size:'small',i:'2026-06-26',o:'2026-07-25',note:'+Bravecto'},
  {id:17,name:'Doty',size:'small',i:'2026-06-25',o:'2026-07-22',note:'+cats'},
  {id:18,name:'Teddy B',size:'small',i:'2026-06-08',o:'2026-06-24',note:''},
  {id:19,name:'Chester',size:'small',i:'2026-06-18',o:'2026-07-08',note:''},
  {id:20,name:'Scoty',size:'small',i:'2026-06-21',o:'2026-07-15',note:'day care Jun'},
  {id:21,name:'Scoty',size:'small',i:'2026-07-16',o:'2026-08-06',note:'+Bravecto'},
  {id:22,name:'Cooper W',size:'small',i:'2026-07-01',o:'2026-07-13',note:''},
  {id:23,name:'Cooper W',size:'small',i:'2026-08-01',o:'2026-08-29',note:''},
  {id:24,name:'Paola',size:'small',i:'2026-07-22',o:'2026-08-12',note:''},
  {id:25,name:'Beonie',size:'small',i:'2026-06-18',o:'2026-08-01',note:''},
  {id:26,name:'Hazel',size:'small',i:'2026-07-18',o:'2026-08-16',note:''},
  {id:27,name:'Chanbol',size:'small',i:'2026-06-06',o:'2026-06-14',note:''},
  {id:28,name:'Chanbol',size:'small',i:'2026-06-14',o:'2026-07-13',note:''},
  {id:29,name:'Bob',size:'small',i:'2026-06-25',o:'2026-07-20',note:''},
  {id:30,name:'Teddy Barry',size:'small',i:'2026-06-08',o:'2026-06-22',note:''},
  {id:31,name:'Teddy White',size:'small',i:'2026-06-10',o:'2026-08-18',note:''},
  {id:32,name:'Archer',size:'small',i:'2026-07-07',o:'2026-07-31',note:''},
  {id:33,name:'Brik',size:'small',i:'2026-07-26',o:'2026-08-17',note:''},
  {id:34,name:'Yuki',size:'small',i:'2026-08-25',o:'2026-09-15',note:''},
  {id:35,name:'Margo',size:'small',i:'2026-07-19',o:'2026-08-13',note:''},
  {id:36,name:'Cooper Uo',size:'small',i:'2026-08-15',o:'2026-09-08',note:''},
  {id:37,name:'Fancy',size:'small',i:'2026-07-15',o:'2026-08-15',note:''},
  {id:38,name:'Inta',size:'small',i:'2026-07-01',o:'2026-08-06',note:''},
  {id:39,name:'Brownie',size:'small',i:'2026-06-18',o:'2026-07-23',note:''},
  {id:40,name:'Margo 2',size:'small',i:'2026-07-20',o:'2026-08-14',note:''},
];

function save(){try{localStorage.setItem('gemmi_dogs',JSON.stringify(dogs));localStorage.setItem('gemmi_uid',uid);}catch(e){}}
function load(){try{const d=localStorage.getItem('gemmi_dogs');const u=localStorage.getItem('gemmi_uid');if(d)dogs=JSON.parse(d);if(u)uid=parseInt(u);}catch(e){}}

function dogsOn(s){return dogs.filter(d=>d.i<=s&&d.o>=s)}

function toggleAdd(){
  showAdd=!showAdd;
  document.getElementById('add-section').style.display=showAdd?'block':'none';
}

function addDog(){
  const n=document.getElementById('an').value.trim();
  const s=document.getElementById('as').value;
  const i=document.getElementById('ai').value;
  const o=document.getElementById('ao').value;
  const note=document.getElementById('an2').value.trim();
  if(!n||!i||!o){alert('Please fill in the name, check-in and check-out dates.');return;}
  if(o<=i){alert('Check-out must be after check-in.');return;}
  dogs.push({id:uid++,name:n,size:s,i,o,note});
  document.getElementById('an').value='';
  document.getElementById('an2').value='';
  save();
  render();
  if(selDate)renderDetail();
}

function removeDog(id){
  if(!confirm('Remove this dog?'))return;
  dogs=dogs.filter(d=>d.id!==id);
  save();
  render();
  if(selDate)renderDetail();
}

function changeMonth(d){vM+=d;if(vM<0){vM=11;vY--;}else if(vM>11){vM=0;vY++;}renderCal();}

function render(){renderStats();renderCal();}

function renderStats(){
  const t=tod();
  const here=dogsOn(t);
  const big=here.filter(d=>d.size==='big').length;
  const small=here.filter(d=>d.size==='small').length;
  const soon=dogs.filter(d=>d.i>t).length;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat"><div class="stat-n">${here.length}</div><div class="stat-l">Here today</div></div>
    <div class="stat"><div class="stat-n" style="color:#0F6E56">${big}</div><div class="stat-l">Big dogs 🐕</div></div>
    <div class="stat"><div class="stat-n" style="color:#3C3489">${small}</div><div class="stat-l">Small dogs 🐩</div></div>
    <div class="stat"><div class="stat-n">${soon}</div><div class="stat-l">Arriving soon</div></div>
  `;
}

function renderCal(){
  document.getElementById('mtitle').textContent=MS[vM]+' '+vY;
  const nd=dim(vY,vM), t=tod();
  const firstDow=(new Date(vY,vM,1).getDay()+6)%7;
  const counts=Array.from({length:nd},(_,i)=>{
    const s=vY+'-'+String(vM+1).padStart(2,'0')+'-'+String(i+1).padStart(2,'0');
    return dogsOn(s).length;
  });
  const maxC=Math.max(1,...counts);

  let h=WD.map(d=>`<div class="cal-hdr">${d}</div>`).join('');
  for(let i=0;i<firstDow;i++) h+=`<div class="day empty"></div>`;

  for(let d=1;d<=nd;d++){
    const ds=vY+'-'+String(vM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const here=dogsOn(ds);
    const big=here.filter(x=>x.size==='big').length;
    const small=here.filter(x=>x.size==='small').length;
    const total=here.length;
    const isToday=ds===t, isSel=ds===selDate;
    const bigW=Math.round((big/maxC)*100), smallW=Math.round((small/maxC)*100);

    h+=`<div class="day${isToday?' today':''}${isSel?' selected':''}${total===0?' zero':''}" onclick="selectDay('${ds}')">
      <div class="day-num">${d}</div>
      <div class="day-total">${total>0?total:'—'}</div>
      ${total>0?`<div class="day-bars">
        ${big>0?`<div class="bar-big" style="width:${bigW}%;min-width:4px"></div>`:''}
        ${small>0?`<div class="bar-small" style="width:${smallW}%;min-width:4px"></div>`:''}
      </div>`:''}
    </div>`;
  }
  document.getElementById('cal').innerHTML=h;
}

function selectDay(ds){
  selDate=ds;
  renderCal();
  renderDetail();
}

function renderDetail(){
  const here=dogsOn(selDate);
  const d=pd(selDate);
  const label=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const el=document.getElementById('detail');
  el.style.display='block';

  if(!here.length){
    el.innerHTML=`<div class="detail-title">${label}</div><div class="detail-sub">No dogs on this day.</div>`;
    return;
  }

  const big=here.filter(x=>x.size==='big');
  const small=here.filter(x=>x.size==='small');

  let html=`<div class="detail-title">${label}</div>
    <div class="detail-sub">${here.length} dog${here.length!==1?'s':''} total — ${big.length} big, ${small.length} small</div>`;

  if(big.length){
    html+=`<div class="group-label" style="color:#0F6E56">Big dogs (${big.length})</div><div class="chips">`;
    big.forEach(dog=>{
      html+=`<div class="chip chip-big">🐕 ${dog.name}${dog.note?' <small style="opacity:.7">'+dog.note+'</small>':''} <button class="btn-del" onclick="removeDog(${dog.id})" title="Remove">✕</button></div>`;
    });
    html+='</div>';
  }
  if(small.length){
    html+=`<div class="group-label" style="color:#3C3489">Small dogs (${small.length})</div><div class="chips">`;
    small.forEach(dog=>{
      html+=`<div class="chip chip-small">🐩 ${dog.name}${dog.note?' <small style="opacity:.7">'+dog.note+'</small>':''} <button class="btn-del" onclick="removeDog(${dog.id})" title="Remove">✕</button></div>`;
    });
    html+='</div>';
  }

  el.innerHTML=html;
}

load();
const t=tod(), dn=pd(t);
document.getElementById('hdate').textContent='Today is '+dn.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
document.getElementById('ai').value=t;
document.getElementById('ao').min=t;
document.getElementById('ai').addEventListener('change',()=>{
  document.getElementById('ao').min=document.getElementById('ai').value;
});
selDate=t;
render();
renderDetail();
</script>
</body>
</html>
